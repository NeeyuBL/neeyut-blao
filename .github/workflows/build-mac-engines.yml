name: Build macOS Engines & Publish to Release assets-v1

on:
  workflow_dispatch:
  push:
    tags:
      - 'assets-v*'
    paths:
      - 'engines/**'
      - '.github/workflows/build-mac-engines.yml'

jobs:
  build-mac-engines:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyInstaller & Base Build Tools
        run: |
          python -m pip install --upgrade pip setuptools wheel pyinstaller

      - name: Build Douyin Engine (macOS)
        run: |
          cd engines/douyin-engine
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          if [ -f "dy-engine.spec" ]; then
            pyinstaller dy-engine.spec
          else
            pyinstaller --onefile --name dy-engine run.py
          fi
          if [ -f "dist/dy-engine" ]; then
            mv dist/dy-engine dist/dy-engine-macos
          fi
          chmod +x dist/dy-engine-macos || true

      - name: Build Whisper Engine (macOS)
        run: |
          cd engines/whisper-engine
          pip install faster-whisper ctranslate2 onnxruntime sentencepiece tokenizers sherpa_onnx wtpsplit_lite || true
          if [ -f "whisper-engine.spec" ]; then
            pyinstaller whisper-engine.spec
          else
            pyinstaller --onedir --name whisper-engine engine.py
          fi
          chmod +x dist/whisper-engine/whisper-engine || true
          cd dist
          zip -r whisper-engine-macos.zip whisper-engine/

      - name: Build OCR Engine (macOS)
        run: |
          cd engines/ocr-engine
          pip install rapidocr_onnxruntime opencv-python-headless numpy || true
          if [ -f "ocr-engine.spec" ]; then
            pyinstaller ocr-engine.spec
          else
            pyinstaller --onedir --name ocr-engine engine.py
          fi
          chmod +x dist/ocr-engine/ocr-engine || true
          cd dist
          zip -r ocr-engine-macos.zip ocr-engine/

      - name: Publish Binaries to Release assets-v1
        uses: softprops/action-gh-release@v2
        with:
          tag_name: assets-v1
          name: "Assets Release v1"
          prerelease: true
          allowUpdates: true
          files: |
            engines/douyin-engine/dist/dy-engine-macos
            engines/whisper-engine/dist/whisper-engine-macos.zip
            engines/ocr-engine/dist/ocr-engine-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

