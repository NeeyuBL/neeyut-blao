appId: com.neeyubl.tblao
productName: T-blao
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
mac:
  target:
    - dmg
  icon: build/icon.png
  category: public.app-category.utilities
  artifactName: ${productName}-${version}.${ext}
# Nguon phat hanh cho electron-updater (app tu cap nhat tu GitHub Releases).
# LUU Y: owner/repo phai TRUNG repo that ma ban up Release len.
publish:
  provider: github
  owner: NeeyuBL
  repo: T-blao
